{% extends "principal.html" %}
{% load static %}
{% block title %}Iniciar Sesión{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lobster&display=swap">
{% endblock %}

{% block content %}
<div class="Contenedor-Login-1">
    <div class="Contenedor-Login-2">
        <h2 class="Login-1">Iniciar Sesión</h2>

        <a href="{% url 'Principal' %}">
            <button class="Login-5">← Volver al menu</button>
        </a>

        <form class="Login-2" method="post">
            {% csrf_token %}
            <input class="Login-3" type="text" name="username" placeholder="Usuario" required>
            <input class="Login-4" type="password" name="password" placeholder="Contraseña" required>
            <button class="Login-5" type="submit">Entrar</button>
        </form>

        <a href="{% url 'password_reset' %}">
            <button class="Login-5">🔑 Recuperar contraseña</button>
        </a>

    </div>
</div>
{% endblock %}
