{% extends "principal.html" %}
{% load static %}
{% block title %}Contáctanos{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/contactanos.css' %}">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lobster&display=swap">
<style>
    .Contenedor-Contactanos-1 {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .Contenedor-Contactanos-2 {
        border: 2px solid blue;
        width: 80%;
        text-align: center;
        border-radius: 20px;
        box-shadow: 0px 0px 10px 5px blue;
        margin: 3% auto;
        padding: 10px;
    }
    .Contactanos-1 {
        color: blue !important;
        font-family: 'Lobster', cursive !important;
        text-shadow: 2px 2px 4px blue;
        font-size: clamp(20px, 3vw, 36px);
        margin: 0;
    }
    .Contenedor-Contactanos-3 {
        display: flex;
        justify-content: center;
        padding: 10px 20px;
    }
    .Contenedor-Contactanos-4 {
        width: 100%;
        max-width: 550px;
        border: 2px solid red;
        border-radius: 20px;
        padding: 30px;
        background: linear-gradient(#e6f0ff, #99ccff, #3366cc) !important;
        box-shadow: 0px 0px 10px 3px rgba(0,0,255,0.4);
        box-sizing: border-box;
    }
    .Contenedor-Contactanos-5 {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
    }
    .Contactanos-2 {
        color: blue !important;
        font-family: 'Lobster', cursive !important;
        font-size: clamp(13px, 1.5vw, 17px);
        margin-bottom: 6px;
    }
    .Contactanos-3, .Contactanos-4 {
        padding: 10px 14px;
        border: 2px solid blue !important;
        border-radius: 10px;
        font-family: 'Poppins', sans-serif;
        background: white !important;
        color: blue !important;
        outline: none;
    }
    .Contactanos-4 { min-height: 120px; resize: vertical; }
    .Contenedor-Contactanos-6 { display: flex; justify-content: center; }
    .Contactanos-5 {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #ff0000, #0000ff) !important;
        color: white !important;
        font-size: clamp(13px, 1.5vw, 16px);
        font-family: 'Lobster', cursive !important;
        cursor: pointer;
        transition: transform 0.2s;
        box-shadow: 0px 0px 8px 2px rgba(0,0,255,0.4);
    }
    .Contactanos-5:hover { transform: scale(1.03); }
    .Contenedor-Contactanos-7 {
        display: flex;
        justify-content: center;
        margin: 20px 0 30px;
    }
    .Contactanos-6 {
        padding: 10px 25px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #0000ff, #ff0000) !important;
        color: white !important;
        font-family: 'Lobster', cursive !important;
        cursor: pointer;
        transition: transform 0.2s;
        box-shadow: 0px 0px 8px 2px rgba(0,0,255,0.4);
    }
    .Contactanos-6:hover { transform: scale(1.05); }
</style>
{% endblock %}

{% block content %}

<div class="Contenedor-Contactanos-1">
    <div class="Contenedor-Contactanos-2">
        <h1 class="Contactanos-1">📩 Contáctanos</h1>
    </div>
</div>

<div class="Contenedor-Contactanos-3">
    <div class="Contenedor-Contactanos-4">
        <form method="POST">
            {% csrf_token %}
            <div class="Contenedor-Contactanos-5">
                <label class="Contactanos-2">Nombre completo *</label>
                <input class="Contactanos-3" type="text" name="nombre" placeholder="Tu nombre completo" required>
            </div>

            <div class="Contenedor-Contactanos-5">
                <label class="Contactanos-2">Número de teléfono *</label>
                <input class="Contactanos-3" type="tel" name="telefono" placeholder="Tu número de teléfono" required>
            </div>

            <div class="Contenedor-Contactanos-5">
                <label class="Contactanos-2">Correo electrónico *</label>
                <input class="Contactanos-3" type="email" name="correo" placeholder="Tu correo electrónico" required>
            </div>

            <div class="Contenedor-Contactanos-5">
                <label class="Contactanos-2">Mensaje *</label>
                <textarea class="Contactanos-4" name="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>

            <div class="Contenedor-Contactanos-6">
                <button class="Contactanos-5" type="submit">Enviar mensaje</button>
            </div>
        </form>
    </div>
</div>

<div class="Contenedor-Contactanos-7">
    <a href="javascript:history.back()">
        <button class="Contactanos-6">← Volver atrás</button>
    </a>
</div>

{% endblock %}
